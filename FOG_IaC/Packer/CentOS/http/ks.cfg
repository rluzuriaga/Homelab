text

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information
network  --bootproto=dhcp --device=ens18 --ipv6=auto --activate

repo --name="AppStream" --baseurl=file:///run/install/repo/AppStream

%packages
@^server-product-environment
@guest-agents

%end

# Run the Setup Agent on first boot
firstboot --enable
# Do not configure the X Window System
skipx

ignoredisk --only-use=sda

# Partition clearing information
clearpart --none --initlabel
# Disk partitioning information
part swap --fstype="swap" --ondisk=sda --size=4096
part /boot --fstype="xfs" --ondisk=sda --size=1024
part / --fstype="xfs" --ondisk=sda --size=60413
part biosboot --fstype="biosboot" --ondisk=sda --size=1

# System timezone
timezone America/Los_Angeles --utc

# Root password
# Use this command to generate the hashed password: openssl passwd -6
# Make sure that it is the same password as the ssh in your secrets file
rootpw --iscrypted --allow-ssh $6$PM/fayoN.LGV8rNf$5POZu7EdRpaAq.A/dPjKNfMXAxBm2wtHI67rpKcUW4/34CKGSvDUXyNjtjxLkhUKgmRFA0TPLG/4aF9jq6iU.0

# Other User
#
# user --name=username --groups=wheel --iscrypted --password=$6$...

reboot
